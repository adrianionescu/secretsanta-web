name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  GAR_HOST: us-central1-docker.pkg.dev
  GAR_REPO: secret-santa

jobs:
  # ─── Deploy backend ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_HOST }}

      - name: Build and push Backend image
        env:
          IMAGE: ${{ env.GAR_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/backend:${{ github.sha }}
        run: |
          docker build -f apps/backend/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Deploy Backend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: secret-santa-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GAR_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/backend:${{ github.sha }}
          env_vars: |
            DB_PROVIDER=firestore
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          flags: --allow-unauthenticated --port=3000 --memory=512Mi --cpu=1

  # ─── Deploy Web ──────────────────────────────────────────────────────────────
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-backend

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_HOST }}

      - name: Build and push Web image
        env:
          IMAGE: ${{ env.GAR_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/web:${{ github.sha }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.url }}
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg BACKEND_URL=${BACKEND_URL} \
            -t $IMAGE .
          docker push $IMAGE

      - name: Deploy Web to Cloud Run
        id: deploy-web
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: secret-santa-web
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GAR_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/web:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080 --memory=256Mi --cpu=1

      - name: Set FRONTEND_URL on Backend
        run: |
          gcloud run services update secret-santa-backend \
            --region=${{ env.GCP_REGION }} \
            --update-env-vars="FRONTEND_URL=${{ steps.deploy-web.outputs.url }}"
