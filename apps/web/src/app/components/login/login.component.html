<div class="login-container">
  <div class="login-card">
    <h1>🎅 Secret Santa</h1>
    <p class="subtitle">Sign in to continue</p>
    <div #googleBtn></div>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    @if (loading) {
      <p class="loading">Signing in…</p>
    }
  </div>
</div>
